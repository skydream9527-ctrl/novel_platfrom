sources:
  official_docs:
    - name: OpenAI Docs
      url: https://platform.openai.com/docs
      type: docs
      priority: high
    - name: Anthropic Docs
      url: https://docs.anthropic.com/
      type: docs
      priority: high
    - name: Google AI
      url: https://ai.google.dev/
      type: docs
      priority: high

  framework_sources:
    - name: LangChain
      url: https://docs.langchain.com/
      type: framework
      priority: medium
    - name: LlamaIndex
      url: https://docs.llamaindex.ai/
      type: framework
      priority: medium
    - name: OpenRouter
      url: https://openrouter.ai/docs/overview
      type: tooling
      priority: medium

  release_and_news:
    - name: OpenAI News
      url: https://openai.com/news/
      type: news
      priority: high
    - name: Anthropic News
      url: https://www.anthropic.com/news
      type: news
      priority: high
    - name: GitHub Trending AI
      url: https://github.com/trending?since=daily
      type: community
      priority: low

schedule:
  daily_scan:
    enabled: true
    focus:
      - release_and_news
  weekly_scan:
    enabled: true
    focus:
      - official_docs
      - framework_sources
  monthly_review:
    enabled: true
    focus:
      - best_option_refresh
