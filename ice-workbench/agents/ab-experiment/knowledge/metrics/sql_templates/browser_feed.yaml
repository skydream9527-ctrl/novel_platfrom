收入指标:
  - name: 浏览器信息流ARPU
    sql: |
      SELECT  a.date,
              sum(fee)/count(distinct a.did) arpu
      FROM
      (
          SELECT  date, did
          FROM    iceberg_zjyprc_hadoop.browser.dwm_browser_event_aggregation_label_di
          WHERE   date=${date-1}
                  and is_dau_feed_dapan_2024=1
          GROUP BY date, did
      )a
      join
      (
          SELECT  date, did,
                  sum(fee_amt)/100000 as fee
          FROM    iceberg_zjyprc_hadoop.browser.dwm_browser_ad_event_aggregation_di
          WHERE   date=${date-1}
          GROUP BY date, did
      )b
      on a.date=b.date and a.did=b.did
      GROUP BY a.date

