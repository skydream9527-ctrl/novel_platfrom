    sql: |
      SELECT  date, city,
              count(distinct did)
      FROM    iceberg_zjyprc_hadoop.browser.dwm_browser_event_aggregation_label_di
      WHERE  is_app_dau_2024 = 1
      GROUP BY date, city
    drill_dimension: city

  - name: 浏览器分广告位收入
    sql: |
      SELECT  date, tag_id,
              sum(fee_amt)/100000 as fee
      FROM    iceberg_zjyprc_hadoop.browser.dwm_browser_ad_event_aggregation_di
      WHERE   date=${date-1}
      GROUP BY date, tag_id
    drill_dimension: tag_id

  - name: 浏览器分启动方式收入
    sql: |
      SELECT  a.date, app_launch_way, sum(fee) fee
      FROM
      (
          SELECT  date, did, app_launch_way
          FROM    iceberg_zjyprc_hadoop.browser.dwm_browser_event_aggregation_label_di
          WHERE   date=${date-1}
                  and is_app_dau_2024=1
          GROUP BY date, did, app_launch_way
      )a
      LEFT JOIN
      (
          SELECT  date, did,
                  sum(fee_amt)/100000 as fee
          FROM    iceberg_zjyprc_hadoop.browser.dwm_browser_ad_event_aggregation_di
          WHERE   date=${date-1}
          GROUP BY date, did
      )b
      on a.date=b.date and a.did=b.did
      GROUP BY a.date, app_launch_way
    drill_dimension: app_launch_way
