ad_table: iceberg_zjyprc_hadoop.browser.dwm_browser_ad_event_aggregation_di
dau_flag: is_dau_feed_dapan_2024=1

规模指标:
  - name: 浏览器信息流DAU/日活
    sql: |
      SELECT  date, count(distinct did)
      FROM    iceberg_zjyprc_hadoop.browser.dwm_browser_event_aggregation_label_di
      WHERE   date=${date-1}
              and is_dau_feed_dapan_2024=1
      GROUP BY date

  - name: 浏览器信息流分新老用户DAU/日活
    sql: |
      SELECT  date,
              CASE WHEN is_new_feed_2024=1 THEN 'new'
                   WHEN is_new_feed_2024=0 THEN 'old'
              END as is_new_user,
              count(distinct did)
      FROM    iceberg_zjyprc_hadoop.browser.dwm_browser_event_aggregation_label_di
      WHERE   date=${date-1}
      GROUP BY date,
               CASE WHEN is_new_feed_2024=1 THEN 'new'
                    WHEN is_new_feed_2024=0 THEN 'old'
               END
    drill_dimension: is_new_user

  - name: 浏览器信息流消费DAU/日活
    sql: |
      SELECT
          date,
          count(distinct did)
      FROM
          iceberg_zjyprc_hadoop.browser.dwm_browser_event_aggregation_label_di
