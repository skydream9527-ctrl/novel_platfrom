drill_dimensions_summary:
  - dimension: app_launch_way
    description: 启动方式
    available_in: [浏览器主端, 浏览器信息流]
  - dimension: is_new_user
    description: 新老用户
    available_in: [浏览器主端, 浏览器信息流, 内容中心]
  - dimension: item_type
    description: 体裁
    available_in: [浏览器信息流, 内容中心]
  - dimension: feed_channel
    description: 频道
    available_in: [浏览器信息流, 内容中心]
  - dimension: page
    description: 页面
    available_in: [浏览器信息流, 内容中心]
  - dimension: source
    description: 内容源（火山/自建）
    available_in: [浏览器信息流]
  - dimension: tag_id
    description: 广告位
    available_in: [浏览器主端, 浏览器信息流, 内容中心]
  - dimension: app_ver
    description: 客户端版本
    available_in: [浏览器主端]
  - dimension: model
    description: 机型
    available_in: [浏览器主端]
  - dimension: os_ver
    description: 系统版本
    available_in: [浏览器主端]
  - dimension: miui
    description: MIUI版本
    available_in: [浏览器主端]
  - dimension: province
    description: 省份
    available_in: [浏览器主端]
  - dimension: city
    description: 城市
    available_in: [浏览器主端]
  - dimension: third_packagename
    description: 三方调起包名
    available_in: [浏览器主端]
