<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>登录 — AI 文字创作平台</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --color-primary: #4a8fe7;
    --color-primary-hover: #3d7bd4;
    --color-primary-light: #e8f0fe;
    --color-bg: #f8f9fa;
    --color-bg-card: #ffffff;
    --color-bg-input: #f1f3f4;
    --color-bg-hover: #f1f3f4;
    --color-text: #1f1f1f;
    --color-text-secondary: #5f6368;
    --color-text-muted: #9aa0a6;
    --color-border: #e8eaed;
    --color-error: #ea4335;
    --shadow-lg: 0 4px 12px rgba(0,0,0,0.08), 0 1px 3px rgba(0,0,0,0.04);
    --shadow-xl: 0 8px 24px rgba(0,0,0,0.1), 0 2px 6px rgba(0,0,0,0.04);
    --radius: 12px;
    --radius-xl: 24px;
    --font-body: "Inter", "Noto Sans SC", -apple-system, BlinkMacSystemFont, sans-serif;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:var(--font-body); background:var(--color-bg); color:var(--color-text); -webkit-font-smoothing:antialiased; }
  button { font-family:inherit; cursor:pointer; border:none; outline:none; }
  input { font-family:inherit; outline:none; }

  .login-page {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .login-card {
    background: var(--color-bg-card);
    border-radius: var(--radius-xl);
    box-shadow: var(--shadow-xl);
    padding: 48px 40px;
    width: 420px;
    max-width: 90vw;
  }

  .login-title {
    font-size: 26px;
    font-weight: 700;
    text-align: center;
    margin-bottom: 6px;
    letter-spacing: -0.5px;
  }

  .login-subtitle {
    text-align: center;
    color: var(--color-text-secondary);
    margin-bottom: 32px;
    font-size: 14px;
  }

  .login-tabs {
    display: flex;
    margin-bottom: 28px;
    background: var(--color-bg-input);
    border-radius: var(--radius);
    padding: 4px;
  }

  .login-tabs button {
    flex: 1;
    padding: 10px;
    background: transparent;
    color: var(--color-text-secondary);
    font-size: 14px;
    font-weight: 500;
    border-radius: 8px;
    transition: all 0.2s;
  }

  .login-tabs button.active {
    background: var(--color-bg-card);
    color: var(--color-text);
    box-shadow: 0 1px 2px rgba(0,0,0,0.05);
  }

  .login-tabs button:hover:not(.active) {
    color: var(--color-text);
  }

  form {
    display: flex;
    flex-direction: column;
    gap: 14px;
  }

  form input {
    padding: 12px 16px;
    background: var(--color-bg-input);
    border: 1px solid transparent;
    border-radius: var(--radius);
    color: var(--color-text);
    font-size: 14px;
    transition: all 0.2s;
  }

  form input:focus {
    background: var(--color-bg-card);
    border-color: var(--color-primary);
    box-shadow: 0 0 0 3px var(--color-primary-light);
  }

  form input::placeholder { color: var(--color-text-muted); }

  .login-btn {
    padding: 12px;
    background: var(--color-primary);
    color: #fff;
    border-radius: var(--radius);
    font-size: 15px;
    font-weight: 500;
    margin-top: 4px;
    transition: all 0.2s;
  }

  .login-btn:hover {
    background: var(--color-primary-hover);
    box-shadow: var(--shadow-lg);
  }

  .hint {
    text-align: center;
    color: var(--color-text-muted);
    font-size: 12px;
    margin-top: 24px;
  }
</style>
</head>
<body>
<div class="login-page">
  <div class="login-card">
    <h1 class="login-title">AI 文字创作平台</h1>
    <p class="login-subtitle">小说 / 剧本 / 分镜 — AI 辅助创作</p>

    <div class="login-tabs">
      <button class="active" onclick="this.parentElement.querySelector('.active').classList.remove('active');this.classList.add('active')">登录</button>
      <button onclick="this.parentElement.querySelector('.active').classList.remove('active');this.classList.add('active')">注册</button>
    </div>

    <form onsubmit="return false">
      <input type="email" placeholder="邮箱" />
      <input type="password" placeholder="密码" />
      <button type="submit" class="login-btn">登录</button>
    </form>

    <p class="hint">预览模式 · NotebookLM 设计风格</p>
  </div>
</div>
</body>
</html>
