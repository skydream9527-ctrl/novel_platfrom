      GROUP BY a.date;

  - name: 内容中心LT3
    sql: |
      with t1 as (
          SELECT  date, did
          FROM    iceberg_zjyprc_hadoop.newhome.dwm_newhome_event_aggregation_label_di
          WHERE   date between ${date-7} and ${date-1}
                  and is_dau_2024=1
          GROUP BY date, did
      ),
      t2 as (
          SELECT  date, did
          FROM    iceberg_zjyprc_hadoop.newhome.dwm_newhome_event_aggregation_label_di
          WHERE   date between ${date-7} and ${date-1}
                  and is_dau_2024=1
          GROUP BY date, did
      )
      SELECT  a.date,
              count(b.date)/count(distinct a.did) LT
      FROM
          (
              SELECT  date, did
              FROM    t1
          ) a
          LEFT JOIN (
              SELECT  date, did
              FROM    t2
          ) b
          on a.did=b.did
      WHERE
          b.date>=a.date
          and datediff(from_unixtime(unix_timestamp(cast(b.date as string), 'yyyyMMdd'), 'yyyy-MM-dd'), from_unixtime(unix_timestamp(cast(a.date as string), 'yyyyMMdd'),'yyyy-MM-dd'))<=2
      GROUP BY a.date

