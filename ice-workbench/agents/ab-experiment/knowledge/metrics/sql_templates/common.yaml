date_parameter:
  name: date
  description: 日期参数，格式为 ${date-N}，表示N天前
  examples:
    - "${date-1} → 昨日"
    - "${date-7} → 7天前"
    - "${date-30} → 30天前"

srm_check_query:
  description: SRM校验查询模板（样本比例校验）
  note: 用于校验实验组与对照组的样本比例是否符合预期分配比，需根据实际实验分流表替换表名和字段名
  template: |
    SELECT
      group_name,
      COUNT(DISTINCT user_id) AS sample_size
    FROM experiment_user_table
    WHERE experiment_id = '{experiment_id}'
      AND date BETWEEN '{start_date}' AND '{end_date}'
    GROUP BY group_name
