v2_optimizations_vs_content_center_db:
  - 新增metadata表存储数据库元信息（版本/来源/appid/hive表等）
  - 新增categories表替代硬编码分类，支持扩展
  - 新增sdk_fields表独立存储OneTrack SDK系统属性
  - 新增pages表存储页面定义，从Excel"附1：页面定义"导入
  - 新增event_page_refs表替代event_relations中page关联，支持多对多
  - 新增event_metric_refs表替代event_relations中metric关联，语义更清晰
  - events表新增classification/incognito_report/app_ver字段
  - event_fields表新增is_common_ref/common_group字段
  - common_fields表新增classification/app_ver字段
  - common_field_groups新增scope字段区分作用域（all/content）
  - 自动从事件名模式匹配页面和指标关联

changelog:
  - date: "2026-05-09"
    author: AI
    action: create
    description: |
      创建浏览器埋点知识库（v2.0优化结构）：
      - 从Excel导入239个事件、831个事件字段、71个公共字段
      - 32个SDK系统属性、87个页面定义
      - 355条事件-页面关联、21条事件-指标关联
      - 279条公共属性引用
      - 实验ID字段：eid/exp_id
      - 相比内容中心数据库的结构优化：新增metadata/categories/sdk_fields/pages表
      - event_page_refs/event_metric_refs替代原event_relations混合表
